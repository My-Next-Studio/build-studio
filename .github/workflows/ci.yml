name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      # Electron's binary is not needed for tests or the hub build
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Project-server tests
        working-directory: packages/project-server
        run: node --test

      - name: Hub production build
        working-directory: packages/hub
        run: npx next build
